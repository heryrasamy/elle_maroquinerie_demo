<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Gestion des sacs</title>
<style>
body{font-family:Georgia,serif;background:#f6f1eb;margin:0;color:#3e2f1c;padding:20px;}
h1{text-align:center;margin-bottom:20px;}
#sacList{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px;}
.sac-card{border:1px solid #ddd;border-radius:6px;padding:8px;width:120px;text-align:center;background:#fff;position:relative;}
.sac-card img{width:100%;height:80px;object-fit:cover;border-radius:4px;margin-bottom:4px;}
.sac-card button{position:absolute;top:4px;right:4px;background:#b23b3b;color:white;border:none;border-radius:4px;padding:2px 6px;font-size:0.8rem;cursor:pointer;}
form{display:flex;flex-direction:column;gap:10px;background:#fff;padding:15px;border-radius:8px;border:1px solid #ddd;}
form input, form textarea{padding:8px;border:1px solid #ccc;border-radius:6px;font-size:0.9rem;width:100%;}
form button{background:#8b5e34;color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-family:inherit;}
form button:hover{background:#a66d40;}
#preview{border:1px solid #ccc;padding:10px;margin-top:10px;border-radius:6px;text-align:center;background:#fafafa;}
#preview img{width:100px;height:100px;object-fit:cover;border-radius:4px;margin-bottom:4px;}
#message{margin:10px 0;color:green;font-weight:bold;text-align:center;}
#backBtn{margin-bottom:15px;background:#6a5d4b;color:white;padding:8px 12px;border:none;border-radius:6px;cursor:pointer;}
@media(max-width:600px){#sacList{justify-content:center;}}
</style>
</head>
<body>

<h1>Admin — Gestion des sacs</h1>
<button id="backBtn">← Retour à l’accueil</button>
<div id="message"></div>

<h2>Liste des sacs</h2>
<div id="sacList"></div>

<h2>Ajouter un nouveau sac</h2>
<form id="addSacForm">
  <input type="text" id="title" placeholder="Titre du sac" required>
  <input type="text" id="price" placeholder="Prix (ex: 45,00 €)" required>
  <textarea id="desc" placeholder="Description" rows="3" required></textarea>
  <input type="file" id="img" accept="image/*" required>
  <button type="submit">Ajouter le sac</button>
</form>

<div id="preview"></div>

<script>
document.addEventListener('DOMContentLoaded',()=>{
  const STORAGE_KEY='elle_products_v1';
  const sacList=document.getElementById('sacList');
  const addForm=document.getElementById('addSacForm');
  const message=document.getElementById('message');
  const preview=document.getElementById('preview');
  const backBtn=document.getElementById('backBtn');

  let products=[];
  function loadProducts(){try{const raw=localStorage.getItem(STORAGE_KEY);products=raw?JSON.parse(raw):[];}catch(e){products=[];}}
  function saveProducts(){localStorage.setItem(STORAGE_KEY,JSON.stringify(products));}

  function renderProducts(){
    sacList.innerHTML=products.map((p,i)=>`
      <div class="sac-card" data-id="${i}">
        <img src="${p.img}" alt="${p.title}">
        <div>${p.title}</div>
        <button class="delBtn">×</button>
      </div>
    `).join('');
  }

  function showMessage(txt){message.textContent=txt; setTimeout(()=>{message.textContent='';},2000);}

  sacList.addEventListener('click',e=>{
    if(e.target.classList.contains('delBtn')){
      const id=parseInt(e.target.closest('.sac-card').dataset.id,10);
      products.splice(id,1);
      saveProducts(); renderProducts(); showMessage('Sac supprimé !');
    }
  });

  addForm.addEventListener('submit',e=>{
    e.preventDefault();
    const title=document.getElementById('title').value;
    const price=document.getElementById('price').value;
    const desc=document.getElementById('desc').value;
    const imgFile=document.getElementById('img').files[0];
    if(!imgFile)return;
    const reader=new FileReader();
    reader.onload=()=>{ 
      products.push({title,price,desc,img:reader.result});
      saveProducts(); renderProducts(); showMessage('Sac ajouté !'); addForm.reset(); preview.innerHTML=''; 
    };
    reader.readAsDataURL(imgFile);
  });

  document.getElementById('img').addEventListener('change',e=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=()=>{ preview.innerHTML=`<img src="${reader.result}" alt="Preview"><div>${document.getElementById('title').value}</div>`; };
    reader.readAsDataURL(file);
  });

  backBtn.addEventListener('click',()=>{window.location.href='index.html';});

  loadProducts(); renderProducts();
});
</script>
</body>
</html>

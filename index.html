<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ELLE MAROQUINERIE — Démo</title>
<style>
  :root{
    --bg:#f6f1eb;
    --text:#3e2f1c;
    --accent:#8b5e34;
    --accent-2:#b23b3b;
  }
  *{box-sizing:border-box}
  body{font-family:Georgia,serif;background:var(--bg);color:var(--text);margin:0}
  header{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 20px;background:#fff;box-shadow:0 2px 4px rgba(0,0,0,.05)}
  .brand{display:flex;align-items:center;gap:12px}
  .brand img{height:56px;width:auto;display:block}
  .brand h1{font-size:1.1rem;margin:0;letter-spacing:2px}
  nav a{color:var(--text);text-decoration:none;margin:0 8px}
  nav a:hover{text-decoration:underline}
  .cart-link{font-weight:700;cursor:pointer}
  main{padding:28px 16px;text-align:center}
  h2{font-weight:700;margin:6px 0}
  .subtitle{font-style:italic;color:#6a5d4b;margin-bottom:28px}
  .products{display:flex;flex-wrap:wrap;gap:22px;justify-content:center;padding:0 16px}
  .card{width:260px;background:linear-gradient(#f8f4ef,#f0e8e0);border-radius:10px;padding:12px;box-shadow:0 2px 6px rgba(0,0,0,.08);display:flex;flex-direction:column;cursor:pointer}
  .card img{width:100%;height:220px;object-fit:contain;border-radius:6px;border:1px solid #ddd;background:#fff}
  .card h3{margin:8px 0 6px;font-size:1rem}
  .card p{margin:0 0 8px;font-size:.92rem;color:#4f4030}
  .price{font-weight:700;margin-top:auto}
  .card button{margin-top:10px;background:var(--accent);color:#fff;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;font-family:inherit}
  .card button:hover{background:#a66d40}
  footer{padding:20px;text-align:center;color:#7d6c5f;margin-top:30px}

  /* modal */
  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);align-items:center;justify-content:center;padding:18px;z-index:1000}
  .modal[aria-hidden="false"]{display:flex}
  .modal-content{background:#fff;border-radius:10px;padding:18px;max-width:520px;width:100%;max-height:88vh;overflow:auto;position:relative;box-shadow:0 2px 12px rgba(0,0,0,.2)}
  .modal-content img{width:100%;height:320px;object-fit:contain;border-radius:6px;background:#fff}
  .modal .close{position:absolute;right:12px;top:10px;background:transparent;border:none;font-size:22px;color:var(--accent);cursor:pointer}

  /* cart drawer */
  .cart-drawer{position:fixed;right:0;top:0;height:100vh;width:380px;max-width:95%;background:#fff;box-shadow:-10px 0 24px rgba(0,0,0,.15);transform:translateX(100%);transition:transform .25s;z-index:1500;display:flex;flex-direction:column;padding:18px}
  .cart-drawer[aria-hidden="false"]{transform:translateX(0)}
  .cart-header{display:flex;justify-content:space-between;align-items:center}
  .cart-items{flex:1;overflow:auto;margin-top:12px;display:grid;gap:12px}
  .cart-item{display:flex;gap:10px;align-items:center;border-bottom:1px solid #eee;padding-bottom:8px}
  .cart-item img{width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid #ddd;background:#fff}
  .cart-item .meta{flex:1;text-align:left}
  .qty-controls{display:flex;gap:8px;align-items:center;margin-top:6px}
  .cart-footer{margin-top:12px;border-top:1px solid #eee;padding-top:12px;display:flex;flex-direction:column;gap:10px}
  /* ensure small white area under buttons */
  .cart-footer .actions{display:flex;gap:8px;flex-wrap:wrap;padding-bottom:12px}
  .cart-footer .spacer{height:10px} /* small internal spacer to keep space under the buttons */

  /* responsive */
  @media(max-width:700px){
    .brand img{height:48px}
    .card img{height:200px}
    .card{width:100%;max-width:420px}
    main{padding:20px}
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <img src="assets/Logo.png" alt="ELLE Maroquinerie">
    <h1>ELLE MAROQUINERIE</h1>
  </div>

  <nav aria-label="Navigation principale">
    <a href="index.html">Accueil</a> |
    <a href="cart.html">Panier</a> |
    <a href="admin.html">Admin</a>
  </nav>

  <div id="cartToggle" class="cart-link" role="button" aria-controls="cartDrawer" aria-expanded="false" tabindex="0">👜 Panier (0)</div>
</header>

<main>
  <h2>Collection Capsule — Élégance & Simplicité</h2>
  <p class="subtitle">Petit aperçu : des sacs pensés pour durer et (surtout) pour faire tourner les têtes.</p>

  <section id="tous-les-sacs" class="products" aria-label="Liste des produits"></section>
</main>

<!-- modal produit -->
<div class="modal" id="productModal" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="modal-content" role="document">
    <button class="close" id="closeModal" aria-label="Fermer">×</button>
    <img id="modalImg" src="" alt="">
    <h3 id="modalTitle"></h3>
    <p id="modalDesc"></p>
    <p class="price" id="modalPrice"></p>
    <button id="modalAddBtn">Ajouter au panier</button>
  </div>
</div>

<!-- cart drawer -->
<aside class="cart-drawer" id="cartDrawer" role="region" aria-label="Panier" aria-hidden="true">
  <div class="cart-header">
    <h3>Votre panier</h3>
    <button id="closeCartBtn" class="close" aria-label="Fermer le panier">×</button>
  </div>

  <div class="cart-items" id="cartItems"></div>

  <div class="cart-footer">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <strong>Total</strong><strong id="cartTotal">0,00 €</strong>
    </div>

    <div class="actions">
      <button id="checkoutBtn">Procéder au paiement</button>
      <button id="clearCartBtn" style="background:var(--accent-2)">Vider</button>
    </div>

    <div class="spacer" aria-hidden="true"></div>
  </div>
</aside>

<footer>© 2025 ELLE Maroquinerie — Démo. Paiement non connecté.</footer>

<script>
/* === Clefs localStorage ===
   products: tableau d'objets produits (ajoutable via admin) OR fallback to defaults
   cart: tableau d'items {id, title, price (number), img, qty}
*/
document.addEventListener('DOMContentLoaded', ()=> {
  const LS_PRODUCTS = 'products';
  const LS_CART = 'cart';

  /* ---- produits par défaut (si admin n'a rien ajouté) ---- */
  const defaultProducts = [
    { img: "assets/p1.jpg", title: "Sac Lydia", desc: "Réf : Elle 01 — Longueur 50 cm, largeur 15 cm", price: "80,00 €" },
    { img: "assets/p2.jpg", title: "Sac Salma", desc: "Réf : Elle 02 — Longueur 50 cm, largeur 15 cm", price: "80,00 €" },
    { img: "assets/p3.jpg", title: "Sac Eva", desc: "Réf : PF910 — H45 × L50 × P17 cm", price: "60,00 €" },
    { img: "assets/p4.jpg", title: "Sac Anna", desc: "Réf : PF909 — H50 × L50 × P15 cm", price: "55,00 €" },
    { img: "assets/p5.jpg", title: "Pochette Amina", desc: "Réf : PF909 — H17 × L10 cm", price: "17,50 €" },
    { img: "assets/p6.jpg", title: "Sac Carla", desc: "Réf : 31 — H35 × L35 × P17 cm", price: "40,00 €" },
    { img: "assets/p7.jpg", title: "Sac Alma", desc: "Réf : MC420 — H25 × L30 × P8 cm", price: "45,00 €" },
    { img: "assets/p8.jpg", title: "Pochette Livia", desc: "Réf : Ml450 — H17 × L10 cm", price: "17,50 €" },
    { img: "assets/p9.jpg", title: "Sac Week-end", desc: "Grand format, cuir souple", price: "89,00 €" },
    { img: "assets/p10.jpg", title: "Pochette Dora", desc: "Réf : Ml451 — H17 × L10 cm", price: "17,50 €" },
    { img: "assets/p11.jpg", title: "Pochette Gemma", desc: "Réf : Ml452 — H17 × L10 cm", price: "17,50 €" },
    { img: "assets/p12.jpg", title: "Sac Lydia (var.)", desc: "Variante colorée — L50 × P15 cm", price: "80,00 €" },
    { img: "assets/p13.jpg", title: "Pochette Mina", desc: "Réf : Ml452 — H17 × L10 cm", price: "17,50 €" },
    { img: "assets/p14.jpg", title: "Pochette Enya", desc: "Réf : Ml453 — H17 × L10 cm", price: "17,50 €" },
    { img: "assets/p15.jpg", title: "Pochette Sia", desc: "Réf : Ml454 — H17 × L10 cm", price: "17,50 €" },
    { img: "assets/p16.jpg", title: "Pochette Vitaa", desc: "Réf : Ml455 — H17 × L10 cm", price: "17,50 €" },
    { img: "assets/p17.jpg", title: "Pochette Celia", desc: "Réf : Ml456 — H17 × L10 cm", price: "17,50 €" },
    { img: "assets/p18.jpg", title: "Pochette Nina", desc: "Réf : Ml457 — H17 × L10 cm", price: "17,50 €" },
    { img: "assets/p19.jpg", title: "Sac Sport Chic", desc: "Style & confort", price: "68,00 €" },
    { img: "assets/p20.jpg", title: "Pochette Dina", desc: "Réf : Ml458 — H17 × L10 cm", price: "17,50 €" },
    { img: "assets/p21.jpg", title: "Pochette Mira", desc: "Réf : Ml459 — H17 × L10 cm", price: "17,50 €" },
    { img: "assets/p22.jpg", title: "Sac Joy", desc: "Réf : PF908 — H35 × L42 cm", price: "65,00 €" },
    { img: "assets/p23.jpg", title: "Sac Liana", desc: "Réf : PF909 — H35 × L42 cm", price: "65,00 €" },
    { img: "assets/p24.jpg", title: "Sac Luxe", desc: "Pièce d'exception", price: "120,00 €" }
  ];

  /* ---- loaders ---- */
  function loadProducts(){
    try{
      const raw = localStorage.getItem(LS_PRODUCTS);
      return raw ? JSON.parse(raw) : defaultProducts;
    }catch(e){ return defaultProducts; }
  }

  function loadCart(){
    try{
      const raw = localStorage.getItem(LS_CART);
      return raw ? JSON.parse(raw) : [];
    }catch(e){ return []; }
  }

  function saveCart(cart){ localStorage.setItem(LS_CART, JSON.stringify(cart)); }

  /* ---- helpers ---- */
  const priceFormatter = new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'});
  function parsePriceStr(priceStr){
    if(typeof priceStr === 'number') return priceStr;
    const s = String(priceStr).replace(/[^\d,.-]/g,'').replace(',', '.');
    const n = parseFloat(s);
    return isNaN(n) ? 0 : n;
  }

  /* ---- DOM refs ---- */
  const products = loadProducts();
  const container = document.getElementById('tous-les-sacs');
  const cartToggle = document.getElementById('cartToggle');
  const cartDrawer = document.getElementById('cartDrawer');
  const closeCartBtn = document.getElementById('closeCartBtn');
  const cartItemsDiv = document.getElementById('cartItems');
  const cartTotalEl = document.getElementById('cartTotal');
  const checkoutBtn = document.getElementById('checkoutBtn');
  const clearCartBtn = document.getElementById('clearCartBtn');

  let cart = loadCart();

  function updateCartBadge(){
    const count = cart.reduce((s,i)=>s+i.qty,0);
    cartToggle.textContent = `👜 Panier (${count})`;
  }

  function renderProducts(){
    container.innerHTML = '';
    products.forEach((p, i) => {
      const card = document.createElement('article');
      card.className = 'card';
      card.dataset.index = i;
      card.innerHTML = `
        <img src="${p.img}" alt="${p.title}">
        <h3>${p.title}</h3>
        <p>${p.desc}</p>
        <p class="price">${p.price}</p>
        <button type="button" class="add-btn">Ajouter</button>
      `;
      container.appendChild(card);

      // open modal on card click (but not when clicking the button)
      card.addEventListener('click', (ev) => {
        if(ev.target.closest('.add-btn')) return;
        openModal(i);
      });

      // add button
      card.querySelector('.add-btn').addEventListener('click', (ev) => {
        ev.stopPropagation();
        addToCart(i, 1);
      });
    });
  }

  /* ---- modal handlers ---- */
  const modal = document.getElementById('productModal');
  const modalImg = document.getElementById('modalImg');
  const modalTitle = document.getElementById('modalTitle');
  const modalDesc = document.getElementById('modalDesc');
  const modalPrice = document.getElementById('modalPrice');
  const closeModalBtn = document.getElementById('closeModal');
  const modalAddBtn = document.getElementById('modalAddBtn');
  let currentModalIndex = null;

  function openModal(idx){
    const p = products[idx];
    if(!p) return;
    currentModalIndex = idx;
    modalImg.src = p.img;
    modalImg.alt = p.title;
    modalTitle.textContent = p.title;
    modalDesc.innerHTML = p.desc;
    modalPrice.textContent = p.price;
    modal.setAttribute('aria-hidden','false');
  }
  function closeModal(){ modal.setAttribute('aria-hidden','true'); currentModalIndex = null; }
  closeModalBtn.addEventListener('click', closeModal);
  modal.addEventListener('click', (e)=>{ if(e.target === modal) closeModal(); });
  modalAddBtn.addEventListener('click', ()=>{ if(currentModalIndex!==null){ addToCart(currentModalIndex,1); closeModal(); }});

  /* ---- cart ops ---- */
  function addToCart(idx, qty=1){
    const p = products[idx];
    if(!p){ alert('Produit introuvable'); return; }
    const price = parsePriceStr(p.price);
    const existing = cart.find(it => it.title === p.title && it.price === price && it.img === p.img);
    if(existing) existing.qty += qty;
    else cart.push({ id: Date.now()+Math.random(), title: p.title, price, img: p.img, qty });
    saveCart(cart);
    renderCart();
    updateCartBadge();
  }

  function renderCart(){
    cartItemsDiv.innerHTML = '';
    if(cart.length === 0){
      cartItemsDiv.innerHTML = '<div style="color:#666;text-align:center;padding:20px">Votre panier est vide.</div>';
      cartTotalEl.textContent = priceFormatter.format(0);
      return;
    }
    cart.forEach((item, idx) => {
      const div = document.createElement('div');
      div.className = 'cart-item';
      div.innerHTML = `
        <img src="${item.img}" alt="${item.title}">
        <div class="meta">
          <strong>${item.title}</strong>
          <div style="margin-top:6px">${priceFormatter.format(item.price)} each</div>
          <div class="qty-controls">
            <button class="dec" aria-label="Réduire">−</button>
            <span class="qty">${item.qty}</span>
            <button class="inc" aria-label="Augmenter">+</button>
          </div>
        </div>
        <button class="remove" aria-label="Supprimer" title="Supprimer">×</button>
      `;
      cartItemsDiv.appendChild(div);

      div.querySelector('.inc').addEventListener('click', ()=>{
        item.qty++; saveCart(cart); renderCart(); updateCartBadge();
      });
      div.querySelector('.dec').addEventListener('click', ()=>{
        if(item.qty>1){ item.qty--; saveCart(cart); renderCart(); updateCartBadge(); }
        else if(confirm('La quantité est 1 — voulez-vous supprimer l’article ?')) { cart.splice(idx,1); saveCart(cart); renderCart(); updateCartBadge(); }
      });
      div.querySelector('.remove').addEventListener('click', ()=>{
        if(confirm('Voulez-vous vraiment supprimer cet article du panier ?')){ cart.splice(idx,1); saveCart(cart); renderCart(); updateCartBadge(); }
      });
    });

    const total = cart.reduce((s,i)=>s + (Number(i.price)||0) * i.qty, 0);
    cartTotalEl.textContent = priceFormatter.format(total);
  }

  function saveCart(cartToSave){ localStorage.setItem(LS_CART, JSON.stringify(cartToSave)); }

  /* ---- drawer toggles & actions ---- */
  document.getElementById('cartToggle').addEventListener('click', ()=>{
    const open = cartDrawer.getAttribute('aria-hidden') === 'false';
    cartDrawer.setAttribute('aria-hidden', open ? 'true' : 'false');
  });
  closeCartBtn.addEventListener('click', ()=> cartDrawer.setAttribute('aria-hidden','true'));
  clearCartBtn.addEventListener('click', ()=>{
    if(confirm('Vider complètement le panier ?')){ cart = []; saveCart(cart); renderCart(); updateCartBadge(); }
  });
  checkoutBtn.addEventListener('click', ()=>{
    // redirect to cart page for checkout simulation
    window.location.href = 'cart.html';
  });

  /* ----- initial render ----- */
  renderProducts();
  renderCart();
  updateCartBadge();
});
</script>
</body>
</html>
